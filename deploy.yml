# DengueSHIELD 🛡️🦟

**Surveillance, Health Informatics, and Evidence-Led Defense**

A web-based community participatory vector control platform integrating climate-responsive dengue surveillance for dengue hotspot barangays in Iloilo City, Philippines.

## Features

- 🗺️ **GIS-Enabled Breeding Site Mapping** — GPS coordinates and geotagged photo uploads
- 🌡️ **Climate-Responsive Surveillance Dashboard** — PAGASA weather data integrated with vector indices
- 🤖 **AI-Assisted Risk Stratification** — Logistic regression trained on historical dengue-climate data
- 📚 **CBPLA Digital Learning Modules** — Culturally adapted content in Hiligaynon/Filipino
- 📱 **Community Reporting System** — Mobile-friendly with offline capability

## Tech Stack

- **Frontend:** React.js + Tailwind CSS
- **Backend:** Node.js + Express
- **Database:** PostgreSQL + PostGIS
- **Deployment:** Vercel / GitHub Pages (prototype)

